<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workflow Renewal Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800 flex h-screen overflow-hidden">

    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col justify-between p-4 shrink-0">
        <div>
            <div class="flex items-center gap-2 mb-8 px-2">
                <div class="w-6 h-6 bg-purple-600 rounded"></div>
                <span class="font-bold text-xl tracking-tight">Workflow<span class="text-purple-600">Tracker</span></span>
            </div>
            <nav class="space-y-6">
                <div>
                    <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider px-2">Overview</span>
                    <ul class="mt-2 space-y-1">
                        <li><a href="#" class="flex items-center gap-3 px-2 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 rounded-lg">📊 Executive Dashboard</a></li>
                    </ul>
                </div>
                <div>
                    <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider px-2">Core Operations</span>
                    <ul class="mt-2 space-y-1">
                        <li><a href="#" class="flex justify-between items-center px-2 py-2 text-sm font-medium text-purple-700 bg-purple-50 rounded-lg">🔄 Renewal Processing</a></li>
                        <li><a href="#" class="flex justify-between items-center px-2 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100 rounded-lg">
                            <span>✅ Completed</span>
                            <span id="sidebarCompletedCount" class="bg-green-100 text-green-800 text-xs px-2 py-0.5 rounded-full font-bold">0</span>
                        </a></li>
                    </ul>
                </div>
            </nav>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-y-auto">
        <header class="bg-white border-b border-gray-200 px-8 py-4 flex items-center justify-between shrink-0">
            <h1 class="text-lg font-bold text-gray-900 tracking-wide uppercase">Multi-User Console Terminal</h1>
        </header>

        <div class="p-8 space-y-6 max-w-6xl w-full mx-auto">
            <section class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                <h3 class="text-sm font-bold text-gray-700 uppercase tracking-wider mb-2">📋 Smart Importer</h3>
                <textarea id="importBox" rows="3" class="w-full border border-gray-300 rounded-lg p-3 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500" placeholder="Paste line separated lists here..."></textarea>
                <div class="mt-3 flex justify-end">
                    <button onclick="executeImport()" class="bg-purple-600 hover:bg-purple-700 text-white font-medium text-xs px-4 py-2 rounded-lg cursor-pointer">Execute Database Import</button>
                </div>
            </section>

            <section class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
                <div class="p-4 border-b border-gray-200 bg-gray-50 flex justify-between items-center">
                    <h2 class="font-bold text-gray-800">Renewal Processing Pipeline</h2>
                    <span class="bg-purple-100 text-purple-800 text-xs font-semibold px-2.5 py-0.5 rounded-full" id="recordCount">0 Records</span>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse text-sm">
                        <thead>
                            <tr class="bg-gray-100 text-gray-600 uppercase text-xs font-semibold border-b border-gray-200">
                                <th class="p-4">Client Portfolio</th>
                                <th class="p-4">Timeline</th>
                                <th class="p-4">Stage Action</th>
                            </tr>
                        </thead>
                        <tbody id="clientTableBody">
                            </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <script>
        // Load operational data when page opens
        window.addEventListener('DOMContentLoaded', () => {
            loadDatabaseRecords();
        });

        async function loadDatabaseRecords() {
            // Get Active Clients
            const response = await fetch('/api/clients');
            const clients = await response.json();
            
            const tbody = document.getElementById('clientTableBody');
            tbody.innerHTML = ''; // Wipe existing rows

            clients.forEach(client => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-gray-100 hover:bg-gray-50/50";
                tr.innerHTML = `
                    <td class="p-4">
                        <p class="font-bold text-gray-900 text-base">${client.name}</p>
                        <p class="text-xs text-gray-400">Database Entry Record ID: #${client.id}</p>
                    </td>
                    <td class="p-4 text-xs text-gray-500">
                        <div>Added: <span class="font-mono text-gray-700">${client.date_added}</span></div>
                    </td>
                    <td class="p-4">
                        <button onclick="commitComplete(${client.id}, this)" class="bg-green-600 hover:bg-green-700 text-white text-xs font-bold px-3 py-1 rounded cursor-pointer">COMPLETE</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('recordCount').innerText = `${clients.length} Records`;

            // Update Completed Counter badge
            const countResp = await fetch('/api/clients/completed-count');
            const countData = await countResp.json();
            document.getElementById('sidebarCompletedCount').innerText = countData.count;
        }

        async function executeImport() {
            const textarea = document.getElementById('importBox');
            const lines = textarea.value.split('\n').filter(line => line.trim() !== '');
            if(lines.length === 0) return alert("Enter names to import into database storage!");

            await fetch('/api/import', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ names: lines })
            });

            textarea.value = '';
            loadDatabaseRecords(); // Reload from source database
        }

        async function commitComplete(id, buttonElement) {
            const row = buttonElement.closest('tr');
            row.style.opacity = '0.4';

            await fetch(`/api/clients/${id}/complete`, { method: 'POST' });
            loadDatabaseRecords(); // Synchronize view state
        }
    </script>
</body>
</html>
